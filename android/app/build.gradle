apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

project.ext.envConfigFiles = [
    debug: ".env",
    release: ".env",
]
apply from: new File(rootProject.projectDir, "../node_modules/react-native-config/android/dotenv.gradle")

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 */
def jscFlavor = 'org.webkit:android-jsc:+'
def transistorsoftLicenseKey = (findProperty("TRANSISTORSOFT_LICENSE_KEY") ?: System.getenv("TRANSISTORSOFT_LICENSE_KEY") ?: "") as String
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()

if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion
    
    namespace "io.delivery.max"
    defaultConfig {
        applicationId "io.delivery.max"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        missingDimensionStrategy 'react-native-camera', 'general' 
        manifestPlaceholders = [
            appLinkScheme: "navigator"
        ]
        resValue "string", "build_config_package", "io.delivery.max"
        // Fallbacks for debug/local builds when env-driven values are not provided.
        resValue "string", "TRANSISTORSOFT_LICENSE_KEY", transistorsoftLicenseKey
        resValue "string", "FACEBOOK_APP_ID", ""
        resValue "string", "FACEBOOK_CLIENT_TOKEN", ""
        resValue "string", "GOOGLE_MAPS_API_KEY", "AIzaSyBDssDTm94rQBVf8hsFj8RM8viyTsM36x4"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
    packaging {
        jniLibs {
            pickFirsts += [
                '**/libjsi.so',
                '**/libreactnative.so',
            ]
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    // Firebase setup (enabled only when google-services.json is present)
    if (file('google-services.json').exists()) {
        implementation platform('com.google.firebase:firebase-bom:32.7.3')
        implementation 'com.google.firebase:firebase-messaging'
    }

    // Splash screen
    implementation 'androidx.core:core-splashscreen:1.0.0' 

    if (project.hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

// Apply google-services only when local Firebase config is available.
if (file('google-services.json').exists()) {
    apply plugin: 'com.google.gms.google-services'
}
